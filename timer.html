<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>15分タイマー</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=JetBrains+Mono:wght@500&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }
        .timer-font {
            font-family: 'JetBrains+Mono', monospace;
        }
        .progress-ring {
            transition: stroke-dashoffset 0.35s;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-md text-center border border-slate-100">
        <h1 class="text-2xl font-bold text-slate-800 mb-8">15分タイマー</h1>

        <!-- タイマー表示エリア -->
        <div class="relative flex items-center justify-center mb-10">
            <!-- 円形プログレスバー -->
            <svg class="w-64 h-64">
                <circle
                    class="text-slate-100"
                    stroke-width="8"
                    stroke="currentColor"
                    fill="transparent"
                    r="120"
                    cx="128"
                    cy="128"
                />
                <circle
                    id="progress-circle"
                    class="text-blue-500 progress-ring"
                    stroke-width="8"
                    stroke-dasharray="753.98"
                    stroke-dashoffset="0"
                    stroke-linecap="round"
                    stroke="currentColor"
                    fill="transparent"
                    r="120"
                    cx="128"
                    cy="128"
                />
            </svg>
            
            <div id="timer-display" class="absolute text-6xl font-bold text-slate-700 timer-font">
                15:00
            </div>
        </div>

        <!-- コントロールボタン -->
        <div class="flex gap-4 justify-center">
            <button id="start-pause-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-full transition-all transform active:scale-95 shadow-lg shadow-blue-200">
                スタート
            </button>
            <button id="reset-btn" class="bg-slate-200 hover:bg-slate-300 text-slate-600 font-bold py-3 px-8 rounded-full transition-all transform active:scale-95">
                リセット
            </button>
        </div>

        <!-- 終了メッセージ -->
        <div id="status-message" class="mt-6 text-slate-500 h-6"></div>
    </div>

    <p class="mt-8 text-xs text-slate-400 text-center">
        ※Android/iPhone対応<br>
        スタートボタンを押すと音声が有効になります
    </p>

    <script>
        const INITIAL_TIME = 15 * 60; 
        let timeLeft = INITIAL_TIME;
        let timerId = null;
        let isRunning = false;
        
        // モバイル対応用：AudioContextを保持
        let audioCtx = null;

        const display = document.getElementById('timer-display');
        const startPauseBtn = document.getElementById('start-pause-btn');
        const resetBtn = document.getElementById('reset-btn');
        const progressCircle = document.getElementById('progress-circle');
        const statusMessage = document.getElementById('status-message');

        const CIRCUMFERENCE = 2 * Math.PI * 120;

        function updateDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            display.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            
            const offset = CIRCUMFERENCE - (timeLeft / INITIAL_TIME) * CIRCUMFERENCE;
            progressCircle.style.strokeDashoffset = offset;

            if (timeLeft <= 0) {
                completeTimer();
            }
        }

        function completeTimer() {
            clearInterval(timerId);
            isRunning = false;
            timerId = null;
            startPauseBtn.textContent = 'スタート';
            startPauseBtn.classList.replace('bg-orange-500', 'bg-blue-600');
            statusMessage.textContent = '終了しました！';
            statusMessage.classList.add('text-green-600', 'font-bold');
            playAlarm();
        }

        // 音声を鳴らす関数
        function playAlarm() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            // AudioContextが中断されている場合は再開（モバイル対策）
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            function beep(freq, duration, startTime) {
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();

                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);

                oscillator.type = 'sine';
                oscillator.frequency.value = freq;
                
                gainNode.gain.setValueAtTime(0, startTime);
                gainNode.gain.linearRampToValueAtTime(0.5, startTime + 0.01);
                gainNode.gain.exponentialRampToValueAtTime(0.01, startTime + duration);

                oscillator.start(startTime);
                oscillator.stop(startTime + duration);
            }

            const now = audioCtx.currentTime;
            beep(880, 0.5, now);
            beep(880, 0.5, now + 0.7);
            beep(880, 1.0, now + 1.4);
        }

        // ボタンクリック時にAudioContextを初期化する
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        startPauseBtn.addEventListener('click', () => {
            // Android/iOS向け：最初のクリックでオーディオを「有効化」
            initAudio();

            if (isRunning) {
                clearInterval(timerId);
                isRunning = false;
                startPauseBtn.textContent = '再開';
                startPauseBtn.classList.replace('bg-orange-500', 'bg-blue-600');
            } else {
                if (timeLeft <= 0) {
                    timeLeft = INITIAL_TIME;
                    statusMessage.textContent = '';
                }
                
                isRunning = true;
                startPauseBtn.textContent = '一時停止';
                startPauseBtn.classList.replace('bg-blue-600', 'bg-orange-500');
                
                timerId = setInterval(() => {
                    timeLeft--;
                    updateDisplay();
                }, 1000);
            }
        });

        resetBtn.addEventListener('click', () => {
            clearInterval(timerId);
            isRunning = false;
            timeLeft = INITIAL_TIME;
            timerId = null;
            startPauseBtn.textContent = 'スタート';
            startPauseBtn.classList.remove('bg-orange-500');
            startPauseBtn.classList.add('bg-blue-600');
            statusMessage.textContent = '';
            updateDisplay();
        });

        updateDisplay();
    </script>
</body>
</html>
